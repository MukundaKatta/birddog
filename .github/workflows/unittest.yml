name: unittest (stdlib)

# Runs the dependency-free, standard-library `unittest` suite. No pip
# install is performed, which proves the pure-logic tests in tests/test_core.py
# and tests/test_pure.py exercise birddog's core (allowlist + token bucket +
# audit/attest helpers) without httpx or any optional extra installed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unittest:
    name: unittest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile-check all Python sources
        run: python -m py_compile $(git ls-files '*.py')

      - name: Run standard-library unittest suite
        run: python -m unittest discover -s tests -v
